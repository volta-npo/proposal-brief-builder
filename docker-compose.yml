services:
  app:
    build: .
    image: volta-oss/proposal-brief-builder:local
    ports:
      - "4173:8080"
    environment:
      VOLTA_LOG_LEVEL: info
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
  python-backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app:ro
    command: python -m proposal_brief_builder_backend.server
    environment:
      PYTHONPATH: /app/backend/python
      VOLTA_BACKEND_HOST: 0.0.0.0
      VOLTA_BACKEND_PORT: 8787
    ports:
      - "8787:8787"
    security_opt:
      - no-new-privileges:true

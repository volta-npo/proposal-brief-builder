openapi: 3.1.0
info:
  title: "Proposal Brief Builder API"
  version: "1.1.0"
  description: "Optional backend API for Turn messy discovery notes into a clean grant proposal brief before anyone writes prose."
servers:
  - url: http://127.0.0.1:8787
    description: Python backend
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Product identity and health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /score:
    post:
      summary: Score evidence payload
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidencePayload'
      responses:
        '200':
          description: Release score, warnings, artifacts, and fingerprint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [ok, product, title]
      properties:
        ok:
          type: boolean
        product:
          type: string
        title:
          type: string
    EvidencePayload:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              score: { type: number, minimum: 0, maximum: 100 }
              evidence: { type: string }
              owner: { type: string }
              approved: { type: boolean }
    ScoreResponse:
      type: object
      properties:
        product:
          type: object
        score:
          type: object
        artifacts:
          type: array
          items: { type: string }
        release_hash:
          type: string
        fingerprint:
          type: string
